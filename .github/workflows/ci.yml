name: ci

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftpm:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
