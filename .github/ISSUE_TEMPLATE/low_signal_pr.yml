name: PR help request
description: Ask whether a pull request would be welcome before opening it.
title: "[Proposal]: "
labels: ["needs-triage", "proposal"]
body:
  - type: textarea
    id: change
    attributes:
      label: Proposed change
      description: What do you want to change?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which files or features would be affected?
    validations:
      required: true
