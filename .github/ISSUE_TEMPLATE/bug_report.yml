name: Bug report
description: Report a reproducible bug.
title: "[Bug]: "
labels: ["needs-triage", "bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Please include enough detail to reproduce it."
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "v1.2.3"
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS version and Mac model"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
    validations:
      required: false
